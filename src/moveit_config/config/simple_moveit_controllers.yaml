controller_list:
  - name: rg2_gripper_controller
    action_ns: gripper_action
    type: GripperCommand
    default: True
    joints:
      - finger_joint
  - name: arm_controller
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: True
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint