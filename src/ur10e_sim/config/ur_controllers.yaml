#     shoulder_lift_joint: {p: 5000,  d: 200, i: 0, i_clamp: 1}
#     elbow_joint:         {p: 1000,  d: 60,  i: 0, i_clamp: 1}
#     wrist_1_joint:       {p: 10,   d: 20,  i: 0, i_clamp: 1}
#     wrist_2_joint:       {p: 10,   d: 20,  i: 0, i_clamp: 1}
#     wrist_3_joint:       {p: 5,   d: 10,  i: 0, i_clamp: 1}

rg2_gripper_controller:
  type: "position_controllers/GripperActionController"
  joint: "finger_joint" 
  action_ns: gripper_action 
  constraints:
    goal_time: 1.0
