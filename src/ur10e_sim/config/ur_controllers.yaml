
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 500

arm_controller:
  type: position_controllers/JointTrajectoryController
  joints: &robot_joints
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint

# gains: # Alle P-Werte wurden halbiert, D-Werte angepasst
#     shoulder_pan_joint:  {p: 2000,  d: 200, i: 0, i_clamp: 1}
#     shoulder_lift_joint: {p: 5000,  d: 200, i: 0, i_clamp: 1}
#     elbow_joint:         {p: 1000,  d: 60,  i: 0, i_clamp: 1}
#     wrist_1_joint:       {p: 10,   d: 20,  i: 0, i_clamp: 1}
#     wrist_2_joint:       {p: 10,   d: 20,  i: 0, i_clamp: 1}
#     wrist_3_joint:       {p: 5,   d: 10,  i: 0, i_clamp: 1}

constraints:
  goal_time: 2.0
  stopped_velocity_tolerance: 0.05
  shoulder_pan_joint: {trajectory: 0.1, goal: 0.1}
  shoulder_lift_joint: {trajectory: 0.1, goal: 0.1}
  elbow_joint: {trajectory: 0.1, goal: 0.1}
  wrist_1_joint: {trajectory: 0.2, goal: 0.1}
  wrist_2_joint: {trajectory: 0.2, goal: 0.1}
  wrist_3_joint: {trajectory: 0.2, goal: 0.1}

stop_trajectory_duration: 0.5
state_publish_rate: 500
action_monitor_rate: 10

